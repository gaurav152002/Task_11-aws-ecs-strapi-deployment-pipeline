name: 2 - Deploy Strapi (Blue/Green)

############################################################
# Trigger on push to main branch
############################################################
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    ########################################################
    # 1️⃣ Checkout Repository
    ########################################################
    - name: Checkout Code
      uses: actions/checkout@v4

    ########################################################
    # 2️⃣ Configure AWS Credentials
    ########################################################
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    ########################################################
    # 3️⃣ Login to Amazon ECR
    ########################################################
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    ########################################################
    # 4️⃣ Build Docker Image from strapi-app Folder
    ########################################################
    - name: Build Docker Image
      env:
        ECR_REGISTRY: 811738710312.dkr.ecr.us-east-1.amazonaws.com
        ECR_REPOSITORY: gaurav-strapi-task
        IMAGE_TAG: ${{ github.sha }}
      run: |
        echo "Building Docker image..."
        docker build -t $ECR_REPOSITORY:$IMAGE_TAG ./strapi-app

        echo "Tagging image for ECR..."
        docker tag $ECR_REPOSITORY:$IMAGE_TAG \
        $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

        echo "Pushing image to ECR..."
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    ########################################################
    # 5️⃣ Get Current ECS Task Definition
    ########################################################
    - name: Get Current Task Definition
      run: |
        aws ecs describe-task-definition \
          --task-definition gaurav-task11-task \
          --query taskDefinition \
          > task-definition.json

    ########################################################
    # 6️⃣ Update Image URI in Task Definition
    ########################################################
    - name: Update Task Definition with New Image
      env:
        IMAGE_URI: 811738710312.dkr.ecr.us-east-1.amazonaws.com/gaurav-strapi-task:${{ github.sha }}
      run: |
        echo "Updating image in task definition..."

        jq --arg IMAGE "$IMAGE_URI" '
          .containerDefinitions[0].image=$IMAGE |
          del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )
        ' task-definition.json > new-task-definition.json

    ########################################################
    # 7️⃣ Register New Task Definition Revision
    ########################################################
    - name: Register New Task Definition
      id: register-task
      run: |
        TASK_DEF_ARN=$(aws ecs register-task-definition \
          --cli-input-json file://new-task-definition.json \
          --query "taskDefinition.taskDefinitionArn" \
          --output text)

        echo "New Task Definition ARN: $TASK_DEF_ARN"
        echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV

    ########################################################
    # 8️⃣ Replace TASK_DEFINITION in appspec.json
    ########################################################
    - name: Update AppSpec with New Task Definition
      run: |
        sed -i "s|TASK_DEFINITION|$TASK_DEF_ARN|g" appspec.json

        echo "Updated appspec.json:"
        cat appspec.json

    ########################################################
    # 9️⃣ Trigger CodeDeploy Deployment
    ########################################################
    - name: Trigger Blue/Green Deployment
      id: deploy
      run: |
        DEPLOYMENT_ID=$(aws deploy create-deployment \
          --application-name gaurav-task11-ecs-app \
          --deployment-group-name gaurav-task11-ecs-dg \
          --deployment-config-name CodeDeployDefault.ECSCanary10Percent5Minutes \
          --revision revisionType=AppSpecContent,appSpecContent="{\"content\":\"$(cat appspec.json)\"}" \
          --query deploymentId \
          --output text)

        echo "Deployment ID: $DEPLOYMENT_ID"
        echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV

    ########################################################
    # 🔟 Wait for Deployment to Finish
    ########################################################
    - name: Wait for Deployment to Complete
      run: |
        echo "Waiting for deployment to succeed..."
        aws deploy wait deployment-successful \
          --deployment-id $DEPLOYMENT_ID

        echo "Deployment successful!"